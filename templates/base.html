<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labhansh.ai – Smart Agriculture</title>
    <link
      href="{{ url_for('static', filename='css/output.css') }}"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-background text-textDark font-sans min-h-screen overflow-x-hidden;
        }
        body::before {
          content: "";
          @apply fixed inset-0 pointer-events-none z-0;
          background-image:
            radial-gradient(
              circle at 15% 25%,
              rgba(45, 122, 79, 0.05) 0%,
              transparent 55%
            ),
            radial-gradient(
              circle at 85% 75%,
              rgba(201, 150, 58, 0.04) 0%,
              transparent 55%
            ),
            url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d7a4f' fill-opacity='0.022'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
      }
      @layer utilities {
        .nav-item.active {
          @apply text-accentLight bg-white/10 border-l-[3px] border-accent font-semibold;
        }
        .sidebar.open {
          @apply !translate-x-0;
        }
        .sidebar-overlay.show {
          @apply block;
        }
        .dropdown.show {
          @apply block;
        }
        .lang-btn.active {
          @apply bg-accent text-white;
        }

        .d1 {
          animation-delay: 0.06s;
        }
        .d2 {
          animation-delay: 0.12s;
        }
        .d3 {
          animation-delay: 0.18s;
        }
        .d4 {
          animation-delay: 0.24s;
        }
        .d5 {
          animation-delay: 0.3s;
        }
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    {% include "layout/sidebar.html" %}

    <!-- Navbar -->
    {% include "layout/navbar.html" %}

    <!-- MAIN CONTENT -->
    {% block content %}{% endblock %}

     {% include "layout/footer.html" %} 

    <!-- Mobile Nav -->
    {% include "layout/mobile_nav.html" %} {% block scripts %}
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>

   

    {% endblock %}
  </body>
</html>
