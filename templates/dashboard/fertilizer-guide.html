<!-- Fertilizer Guide page -->
{% extends "base.html" %}{% block page_name %}fertilizer-guide{% endblock %} {%
block title %}Fertilizer Guide{% endblock %} {% block content %}
<div class="bg-background py-10 relative">
  <div class="max-w-5xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
    <!-- ── PAGE HEADER ── -->
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-1.5">
        <div
          class="flex items-center justify-center w-11 h-11 rounded-xl flex-shrink-0 bg-gradient-to-br from-primary to-primaryDark shadow-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
            />
          </svg>
        </div>
        <div>
          <h1
            class="text-2xl sm:text-3xl font-bold leading-tight text-textDark font-heading"
            data-i18n="fert_title"
          ></h1>
          <p
            class="text-sm mt-0.5 text-textLight"
            data-i18n="fert_subtitle"
          ></p>
        </div>
      </div>
    </div>

    <!-- ── FORM CARD ── -->
    <div
      class="bg-white rounded-2xl border p-6 sm:p-8 mb-7 border-backgroundDark shadow-sm"
    >
      <div class="flex items-center gap-2 mb-6">
        <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
        <h2
          class="text-xs font-bold uppercase tracking-widest text-textMid"
          data-i18n="fert_form_section_title"
        ></h2>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-5">
        <!-- Crop Type -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
            data-i18n="fert_label_crop"
          ></label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3C7 3 3 7.5 3 12c0 2.5 1.2 4.8 3 6.3V21h12v-2.7c1.8-1.5 3-3.8 3-6.3 0-4.5-4-9-9-9z"
                />
              </svg>
            </span>
            <select
              id="crop_type"
              name="crop_type"
              class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-9 text-sm appearance-none bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
            >
              <option
                value=""
                disabled
                selected
                data-i18n="fert_crop_placeholder"
              ></option>
              <!-- Crops from your dataset -->
              <option value="Barley" data-i18n="fert_crop_barley"></option>
              <option value="Cotton" data-i18n="fert_crop_cotton"></option>
              <option
                value="Ground Nuts"
                data-i18n="fert_crop_groundnut"
              ></option>
              <option value="Maize" data-i18n="fert_crop_maize"></option>
              <option value="Millets" data-i18n="fert_crop_millets"></option>
              <option value="Oil seeds" data-i18n="fert_crop_oilseeds"></option>
              <option value="Paddy" data-i18n="fert_crop_paddy"></option>
              <option value="Pulses" data-i18n="fert_crop_pulses"></option>
              <option
                value="Sugarcane"
                data-i18n="fert_crop_sugarcane"
              ></option>
              <option value="Tobacco" data-i18n="fert_crop_tobacco"></option>
              <option value="Wheat" data-i18n="fert_crop_wheat"></option>
            </select>
            <span
              class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </span>
          </div>
        </div>

        <!-- Soil Type -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
            data-i18n="fert_label_soil"
          ></label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3 7h18M3 12h18M3 17h18"
                />
              </svg>
            </span>
            <select
              id="soil_type"
              name="soil_type"
              class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-9 text-sm appearance-none bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
            >
              <option
                value=""
                disabled
                selected
                data-i18n="fert_soil_placeholder"
              ></option>
              <option value="alluvial" data-i18n="fert_soil_alluvial"></option>
              <option value="black" data-i18n="fert_soil_black"></option>
              <option value="red" data-i18n="fert_soil_red"></option>
              <option value="laterite" data-i18n="fert_soil_laterite"></option>
              <option value="sandy" data-i18n="fert_soil_sandy"></option>
              <option value="clay" data-i18n="fert_soil_clay"></option>
            </select>
            <span
              class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </span>
          </div>
        </div>

        
        <!-- Temperature (optional) -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
            data-i18n="fert_label_temperature"
          ></label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 19V7a3 3 0 016 0v12m-3 0a3 3 0 110-6 3 3 0 010 6z"
                />
              </svg>
            </span>
            <input
              type="number"
              id="temperature"
              name="temperature"
              min="-20"
              max="60"
              class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-4 text-sm bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
              data-i18n-placeholder="fert_temp_placeholder"
              placeholder="Temperature"
            />
          </div>
        </div>

        <!-- Humidity (optional) -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
            data-i18n="fert_label_humidity"
          ></label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm0 5a1 1 0 011 1v4.586l2.293 2.293a1 1 0 01-1.414 1.414L11 14.414V9a1 1 0 011-1z"
                />
              </svg>
            </span>
            <input
              type="number"
              id="humidity"
              name="humidity"
              min="0"
              max="100"
              class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-4 text-sm bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
              data-i18n-placeholder="fert_humidity_placeholder"
              placeholder="Humidity"
            />
          </div>
        </div>

        <!-- Soil Moisture (optional) -->
        <div>
          <label
            class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
            data-i18n="fert_label_moisture"
          ></label>
          <div class="relative">
            <span
              class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-textLight"
            >
              <svg
                class="w-4 h-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3C8 8 5 12 5 16a7 7 0 0014 0c0-4-3-8-7-13z"
                />
              </svg>
            </span>
            <input
              type="number"
              id="soil_moisture"
              name="soil_moisture"
              min="0"
              max="100"
              class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-4 text-sm bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
              data-i18n-placeholder="fert_moisture_placeholder"
            />
          </div>
        </div>

        <!-- spacer -->
        <div class="hidden sm:block"></div>
      </div>

      <!-- ── NUTRIENT INPUTS ── -->
      <div class="mt-6 pt-5 border-t border-backgroundDark">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h3
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="fert_nutrient_section_title"
          ></h3>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-x-6 gap-y-5">
          <!-- Nitrogen -->
          <div>
            <label
              class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
              data-i18n="fert_label_nitrogen"
            ></label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-xs font-bold text-textLight"
                >N</span
              >
              <input
                type="number"
                id="nitrogen"
                name="nitrogen"
                min="0"
                class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-4 text-sm bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
                data-i18n-placeholder="fert_nitrogen_placeholder"
              />
            </div>
          </div>

          <!-- Phosphorus -->
          <div>
            <label
              class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
              data-i18n="fert_label_phosphorus"
            ></label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-xs font-bold text-textLight"
                >P</span
              >
              <input
                type="number"
                id="phosphorus"
                name="phosphorus"
                min="0"
                class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-4 text-sm bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
                data-i18n-placeholder="fert_phosphorus_placeholder"
              />
            </div>
          </div>

          <!-- Potassium -->
          <div>
            <label
              class="block text-xs font-semibold uppercase tracking-wider mb-1.5 text-textMid"
              data-i18n="fert_label_potassium"
            ></label>
            <div class="relative">
              <span
                class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-xs font-bold text-textLight"
                >K</span
              >
              <input
                type="number"
                id="potassium"
                name="potassium"
                min="0"
                class="w-full rounded-lg border border-backgroundDark py-2.5 pl-9 pr-4 text-sm bg-white text-textDark outline-none focus:outline-none focus:ring-2 focus:ring-primaryLight/50 focus:border-primary transition-all"
                data-i18n-placeholder="fert_potassium_placeholder"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="mt-8">
        <button
          id="fertBtn"
          type="button"
          class="w-full flex items-center justify-center gap-2 rounded-xl py-3.5 px-6 text-sm font-semibold text-white tracking-wide transition-all duration-200 bg-gradient-to-br from-primaryLight to-primary hover:from-primary hover:to-primaryDark hover:shadow-lg shadow-primaryDark/20"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
            />
          </svg>
          <span id="fertBtnText" data-i18n="fert_btn"></span>
          <svg
            id="fertSpinner"
            class="hidden w-4 h-4 animate-spin"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            ></path>
          </svg>
        </button>
      </div>
    </div>
    <!-- /form card -->

    <!-- ── EMPTY STATE ── -->
    <div
      id="emptyState"
      class="bg-white rounded-2xl border border-backgroundDark p-10 text-center shadow-sm"
    >
      <div class="text-5xl mb-3">🧪</div>
      <p
        class="text-sm text-textLight font-medium"
        data-i18n="fert_empty_state"
      ></p>
    </div>

    <!-- ── LOADING STATE ── -->
    <div
      id="loadingState"
      class="hidden bg-white rounded-2xl border border-backgroundDark p-10 text-center shadow-sm"
    >
      <div class="flex flex-col items-center gap-3">
        <svg
          class="w-8 h-8 animate-spin text-primary"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          ></path>
        </svg>
        <p
          class="text-sm text-textLight font-medium"
          data-i18n="fert_loading_text"
        ></p>
      </div>
    </div>

    <!-- ── ERROR STATE ── -->
    <div
      id="errorState"
      class="hidden bg-white rounded-2xl border border-red-200 p-8 shadow-sm"
    >
      <div class="flex items-start gap-3">
        <div
          class="flex-shrink-0 w-9 h-9 rounded-full bg-red-100 flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 text-red-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
            />
          </svg>
        </div>
        <div>
          <p
            class="text-sm font-semibold text-red-700"
            data-i18n="fert_error_title"
          ></p>
          <p id="errorMsg" class="text-xs text-red-500 mt-1"></p>
        </div>
      </div>
    </div>

    <!-- ── RESULT DASHBOARD ── -->
    <div id="resultDashboard" class="hidden space-y-5">
      <!-- ── NUTRIENT ANALYSIS CARD ── -->
      <div
        class="bg-white rounded-2xl border border-backgroundDark p-6 sm:p-8 shadow-sm"
      >
        <div class="flex items-center gap-2 mb-5">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h2
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="fert_nutrient_analysis_title"
          ></h2>
        </div>
        <div class="grid grid-cols-3 gap-4" id="nutrientAnalysis">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- ── RECOMMENDATIONS CARD ── -->
      <div
        class="bg-white rounded-2xl border border-backgroundDark p-6 sm:p-8 shadow-sm"
      >
        <div class="flex items-center gap-2 mb-5">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h2
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="fert_recommendations_title"
          ></h2>
        </div>
        <div id="recommendationsList" class="space-y-4">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- ── SCHEDULE CARD ── -->
      <div
        class="bg-white rounded-2xl border border-backgroundDark p-6 sm:p-8 shadow-sm"
      >
        <div class="flex items-center gap-2 mb-5">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h2
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="fert_schedule_title"
          ></h2>
        </div>
        <div id="scheduleList" class="space-y-3">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- ── TIPS CARD ── -->
      <div
        class="bg-white rounded-2xl border border-backgroundDark p-6 sm:p-8 shadow-sm"
      >
        <div class="flex items-center gap-2 mb-5">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h2
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="fert_tips_title"
          ></h2>
        </div>
        <ul id="tipsList" class="space-y-3">
          <!-- Populated by JS -->
        </ul>
      </div>
    </div>
    <!-- /result dashboard -->
  </div>
</div>

{% block scripts %} {{ super() }}
<script src="{{ url_for('static', filename='js/fertilizer-guide.js') }}"></script>
{% endblock %} {% endblock %}
