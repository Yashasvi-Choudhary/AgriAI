<!-- Plant Disease Detection page -->
 {% extends "base.html" %}{% block page_name %}plant-disease-detection{% endblock %}
{% block title %}Plant Disease Detection{% endblock %} {% block content %}

<div class="bg-background py-10 relative">
  <div class="max-w-5xl mx-auto px-4 py-10 sm:px-6 lg:px-8">
    <!-- ── PAGE HEADER ── -->
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-1.5">
        <div
          class="flex items-center justify-center w-11 h-11 rounded-xl flex-shrink-0 bg-gradient-to-br from-primary to-primaryDark shadow-sm"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
        </div>
        <div>
          <h1
            class="text-2xl sm:text-3xl font-bold leading-tight text-textDark font-heading"
            data-i18n="disease_title"
          ></h1>
          <p
            class="text-sm mt-0.5 text-textLight"
            data-i18n="disease_subtitle"
          ></p>
        </div>
      </div>
    </div>

    <!-- ── UPLOAD CARD ── -->
    <div
      class="bg-white rounded-2xl border p-6 sm:p-8 mb-7 border-backgroundDark shadow-sm"
    >
      <div class="flex items-center gap-2 mb-6">
        <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
        <h2
          class="text-xs font-bold uppercase tracking-widest text-textMid"
          data-i18n="disease_upload_section_title"
        ></h2>
      </div>

      <!-- Drag & Drop Zone -->
      <div
        id="dropZone"
        class="relative flex flex-col items-center justify-center w-full rounded-xl border-2 border-dashed border-backgroundDark bg-backgroundLight transition-all duration-200 cursor-pointer hover:border-primary hover:bg-primary/5 group"
        style="min-height: 220px"
        onclick="document.getElementById('imageInput').click()"
        ondragover="handleDragOver(event)"
        ondragleave="handleDragLeave(event)"
        ondrop="handleDrop(event)"
      >
        <!-- Default state (no image) -->
        <div
          id="dropPlaceholder"
          class="flex flex-col items-center gap-3 py-10 px-4 text-center"
        >
          <div
            class="w-14 h-14 rounded-full bg-white border border-backgroundDark flex items-center justify-center shadow-sm group-hover:border-primary transition-all"
          >
            <svg
              class="w-7 h-7 text-textLight group-hover:text-primary transition-all"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"
              />
            </svg>
          </div>
          <div>
            <p
              class="text-sm font-semibold text-textDark"
              data-i18n="disease_drop_title"
            ></p>
            <p
              class="text-xs text-textLight mt-0.5"
              data-i18n="disease_drop_or"
            ></p>
          </div>
          <button
            type="button"
            class="rounded-lg border border-primary px-4 py-2 text-xs font-semibold text-primary hover:bg-primary hover:text-white transition-all duration-200"
            onclick="
              event.stopPropagation();
              document.getElementById('imageInput').click();
            "
          >
            <span data-i18n="disease_browse_btn"></span>
          </button>
          <p class="text-xs text-textLight" data-i18n="disease_formats"></p>
        </div>

        <!-- Hidden file input -->
        <input
          type="file"
          id="imageInput"
          name="image"
          accept="image/jpeg,image/png,image/webp,image/jpg"
          class="hidden"
          onchange="handleFileSelect(event)"
        />
      </div>

      <!-- ── IMAGE PREVIEW ── -->
      <div id="previewSection" class="hidden mt-5">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h3
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="disease_preview_section_title"
          ></h3>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 items-start">
          <!-- Preview image -->
          <div
            class="relative rounded-xl overflow-hidden border border-backgroundDark shadow-sm flex-shrink-0 w-full sm:w-56 h-48"
          >
            <img
              id="previewImg"
              src=""
              alt="Preview"
              class="w-full h-full object-cover"
            />
            <!-- Remove button -->
            <button
              type="button"
              onclick="removeImage()"
              class="absolute top-2 right-2 w-7 h-7 rounded-full bg-white border border-backgroundDark shadow flex items-center justify-center hover:bg-red-50 hover:border-red-300 transition-all group"
            >
              <svg
                class="w-3.5 h-3.5 text-textLight group-hover:text-red-500 transition-all"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M6 18L18 6M6 6l12 12"
                />
              </svg>
            </button>
          </div>
          <!-- File info -->
          <div class="flex flex-col gap-2 justify-center">
            <div class="flex items-center gap-2">
              <svg
                class="w-4 h-4 text-primary flex-shrink-0"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                />
              </svg>
              <span
                id="previewFileName"
                class="text-sm font-semibold text-textDark truncate max-w-xs"
              ></span>
            </div>
            <span
              id="previewFileSize"
              class="text-xs text-textLight ml-6"
            ></span>
            <button
              type="button"
              onclick="document.getElementById('imageInput').click()"
              class="mt-1 ml-6 self-start rounded-lg border border-backgroundDark px-3 py-1.5 text-xs font-semibold text-textMid hover:border-primary hover:text-primary transition-all"
            >
              <span data-i18n="disease_change_image"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="mt-8">
        <button
          id="detectBtn"
          type="button"
          onclick="detectDisease()"
          class="w-full flex items-center justify-center gap-2 rounded-xl py-3.5 px-6 text-sm font-semibold text-white tracking-wide transition-all duration-200 bg-gradient-to-br from-primaryLight to-primary hover:from-primary hover:to-primaryDark hover:shadow-lg shadow-primaryDark/20"
        >
          <!-- Leaf icon -->
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 3C4.5 3 2 7 2 12c0 3 1.5 5.5 4 7v2h12v-2c2.5-1.5 4-4 4-7 0-5-3-9-7-9-1.5 0-3 .5-4 1.5C9.5 3.5 9 3 9 3z"
            />
          </svg>
          <span id="detectBtnText" data-i18n="disease_btn_detect"></span>
          <svg
            id="detectSpinner"
            class="hidden w-4 h-4 animate-spin"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            ></circle>
            <path
              class="opacity-75"
              fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
            ></path>
          </svg>
        </button>
      </div>
    </div>
    <!-- /upload card -->

    <!-- ── EMPTY STATE ── -->
    <div
      id="emptyState"
      class="bg-white rounded-2xl border border-backgroundDark p-10 text-center shadow-sm"
    >
      <div class="text-5xl mb-3">🌿</div>
      <p
        class="text-sm text-textLight font-medium"
        data-i18n="disease_empty_state"
      ></p>
    </div>

    <!-- ── LOADING STATE ── -->
    <div
      id="loadingState"
      class="hidden bg-white rounded-2xl border border-backgroundDark p-10 text-center shadow-sm"
    >
      <div class="flex flex-col items-center gap-3">
        <svg
          class="w-8 h-8 animate-spin text-primary"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          ></circle>
          <path
            class="opacity-75"
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
          ></path>
        </svg>
        <p
          class="text-sm text-textLight font-medium"
          data-i18n="disease_loading_text"
        ></p>
      </div>
    </div>

    <!-- ── ERROR STATE ── -->
    <div
      id="errorState"
      class="hidden bg-white rounded-2xl border border-red-200 p-8 shadow-sm"
    >
      <div class="flex items-start gap-3">
        <div
          class="flex-shrink-0 w-9 h-9 rounded-full bg-red-100 flex items-center justify-center"
        >
          <svg
            class="w-5 h-5 text-red-500"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
            />
          </svg>
        </div>
        <div>
          <p
            class="text-sm font-semibold text-red-700"
            data-i18n="disease_error_title"
          ></p>
          <p id="errorMsg" class="text-xs text-red-500 mt-1"></p>
        </div>
      </div>
    </div>

    <!-- ── RESULT CARD ── -->
    <div id="resultCard" class="hidden space-y-5">
      <!-- Main disease result -->
      <div
        class="relative bg-white rounded-2xl border border-backgroundDark p-6 sm:p-8 shadow-sm overflow-hidden"
      >
        <!-- Glow -->
        <div
          id="resultGlow"
          class="absolute -top-10 left-1/2 -translate-x-1/2 w-64 h-32 blur-3xl rounded-full pointer-events-none opacity-60"
        ></div>

        <div class="flex items-center gap-2 mb-5">
          <div class="w-1 h-5 rounded-full bg-primaryLight"></div>
          <h2
            class="text-xs font-bold uppercase tracking-widest text-textMid"
            data-i18n="disease_result_section_title"
          ></h2>
        </div>

        <div class="flex flex-col sm:flex-row gap-6 items-start">
          <!-- Submitted image thumbnail -->
          <div
            class="rounded-xl overflow-hidden border border-backgroundDark shadow-sm flex-shrink-0 w-full sm:w-40 h-36"
          >
            <img
              id="resultThumb"
              src=""
              alt="Analysed leaf"
              class="w-full h-full object-cover"
            />
          </div>

          <div class="flex-1 space-y-3">
            <!-- Disease name + healthy badge -->
            <div class="flex flex-wrap items-center gap-2">
              <span id="resultIcon" class="text-3xl"></span>
              <h3
                id="resultDiseaseName"
                class="text-xl font-black text-textDark leading-tight"
              ></h3>
              <span
                id="healthyBadge"
                class="hidden inline-flex items-center gap-1 rounded-full bg-green-100 text-green-700 text-xs font-bold px-3 py-1"
              >
                ✅ <span data-i18n="disease_healthy_badge"></span>
              </span>
            </div>

            <!-- Confidence -->
            <div>
              <div
                class="flex justify-between text-xs font-semibold text-textMid mb-1.5"
              >
                <span data-i18n="disease_confidence_label"></span>
                <span id="confidenceText" class="text-primary"></span>
              </div>
              <div
                class="w-full h-2.5 rounded-full bg-backgroundDark overflow-hidden"
              >
                <div
                  id="confidenceBar"
                  class="h-full rounded-full transition-all duration-700 bg-gradient-to-r from-primaryLight to-primary"
                  style="width: 0%"
                ></div>
              </div>
            </div>

            <!-- Confidence badge -->
            <div>
              <span
                id="confidenceBadge"
                class="inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-bold uppercase tracking-wider bg-green-100 text-green-700"
              ></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Description + Solution row -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <!-- Description -->
        <div
          class="bg-white rounded-2xl border border-backgroundDark p-5 shadow-sm"
        >
          <div class="flex items-center gap-2 mb-3">
            <span class="text-xl">🔬</span>
            <h3
              class="text-xs font-bold uppercase tracking-widest text-textMid"
              data-i18n="disease_description_title"
            ></h3>
          </div>
          <p
            id="resultDescription"
            class="text-sm text-textDark leading-relaxed"
          ></p>
        </div>

        <!-- Treatment -->
        <div
          class="bg-white rounded-2xl border border-backgroundDark p-5 shadow-sm"
        >
          <div class="flex items-center gap-2 mb-3">
            <span class="text-xl">💊</span>
            <h3
              class="text-xs font-bold uppercase tracking-widest text-textMid"
              data-i18n="disease_treatment_title"
            ></h3>
          </div>
          <p
            id="resultSolution"
            class="text-sm text-textDark leading-relaxed"
          ></p>
        </div>
      </div>

      <!-- Detect Again button -->
      <div>
        <button
          type="button"
          onclick="resetDetection()"
          class="w-full flex items-center justify-center gap-2 rounded-xl py-3 px-6 text-sm font-semibold text-textMid tracking-wide border border-backgroundDark hover:border-primary hover:text-primary transition-all duration-200 bg-white"
        >
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
            />
          </svg>
          <span data-i18n="disease_detect_again"></span>
        </button>
      </div>
    </div>
    <!-- /result card -->
  </div>
</div>

{% block scripts %} {{ super() }}
<script src="{{ url_for('static', filename='js/plant-disease-detection.js') }}"></script>
{% endblock %} {% endblock %}
