<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labhansh.ai — Smart Farming Login</title>
    <link
      href="{{ url_for('static', filename='css/output.css') }}"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      #neural {
        position: fixed;
        inset: 0;
        z-index: 0;
        opacity: 0.35;
        pointer-events: none;
      }
      .soil-overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 80% 60% at 50% 110%,
            rgba(101, 67, 33, 0.18) 0%,
            transparent 70%
          ),
          radial-gradient(
            ellipse 60% 40% at 20% 90%,
            rgba(126, 203, 111, 0.07) 0%,
            transparent 60%
          );
      }
      @keyframes cardIn {
        from {
          opacity: 0;
          transform: translateY(28px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      .animate-card {
        animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-primaryDark via-primary to-primaryLight text-textDark min-h-screen overflow-x-hidden "
  >
    <canvas id="neural"></canvas>
    <div class="soil-overlay"></div>

    <div
      class="relative z-20 min-h-screen flex flex-col items-center justify-center p-6"
    >
      <!-- Language Selection -->
      <div class="flex bg-primaryDark/50 rounded-full p-1 w-fit">
        <button
          onclick="setLang('en')"
          id="btn-en"
          class="flex-1 px-6 py-2 rounded-full text-xs font-medium transition-all text-textLight hover:text-accent"
        >
          English
        </button>
        <button
          onclick="setLang('hi')"
          id="btn-hi"
          class="flex-1 px-6 py-2 rounded-full text-xs font-medium transition-all text-textLight hover:text-accent"
        >
          हिंदी
        </button>
      </div>

      <div
        class="animate-card mt-6 w-full max-w-[480px] bg-primary/55 backdrop-blur-2xl backdrop-saturate-150 border border-accent/25 rounded-[24px] p-8 md:p-8 shadow-2xl"
      >
        <!-- Logo -->
        <div class="flex flex-col items-center mb-2">
          <img
            src="/static/images/logo.png"
            alt="Labhansh.ai"
            class="w-52 h-16 rounded-xl shadow-lg"
            onerror="
              this.style.display = 'none';
              document.getElementById('logo-fallback').style.display = 'flex';
            "
          />
          <div
            id="logo-fallback"
            style="display: none"
            class="items-center gap-3"
          >
            <div
              class="w-12 h-12 rounded-xl bg-gradient-to-br from-accent to-accentLight flex items-center justify-center text-2xl shadow-lg"
            >
              🌾
            </div>
            <span class="font-display text-2xl text-accent">Labhansh.ai</span>
          </div>
        </div>

        <div
          class="h-[1px] bg-gradient-to-r from-transparent via-accent/30 to-transparent mb-4"
        ></div>

        <h2 class="font-display text-2xl text-center mb-2" data-i18n="heading">
          Welcome Back
        </h2>
        <p
          class="text-sm text-center text-textLight mb-8 font-light"
          data-i18n="subtext"
        >
          Login to continue your smart farming journey
        </p>

        <form id="login-form" class="space-y-4" novalidate>
          <!-- Email -->
          <div>
            <label
              class="block text-[10px] font-semibold text-textLight uppercase tracking-wider mb-2"
              data-i18n="label_email"
            ></label>
            <div class="relative flex items-center">
              <input
                type="email"
                id="email"
                autocomplete="email"
                inputmode="email"
                class="w-full pl-4 pr-4 py-3 bg-primaryDark/60 border border-textLight/20 rounded-xl outline-none focus:border-accent focus:ring-2 focus:ring-accent/10 transition-all placeholder-textLight/40"
                data-i18n-ph="ph_email"
              />
            </div>
            <span
              id="err-email"
              aria-live="polite"
              class="text-[11px] text-red-400 mt-1 block opacity-0 h-0 transition-all"
            ></span>
          </div>

          <!-- Password -->
          <div>
            <label
              class="block text-[10px] font-semibold text-textLight uppercase tracking-wider mb-2"
              data-i18n="label_pwd"
            ></label>
            <div class="relative flex items-center">
              <input
                type="password"
                id="password"
                autocomplete="current-password"
                class="w-full pl-4 pr-11 py-3 bg-primaryDark/60 border border-textLight/20 rounded-xl outline-none focus:border-accent focus:ring-2 focus:ring-accent/10 transition-all placeholder-textLight/40"
                data-i18n-ph="ph_pwd"
              />
              <button
                type="button"
                onclick="togglePwd('password', this)"
                class="absolute right-4 text-textLight hover:text-accent"
              >
                <i data-lucide="eye" class="w-5 h-5"></i>
              </button>
            </div>
            <span
              id="err-password"
              aria-live="polite"
              class="text-[11px] text-red-400 mt-1 block opacity-0 h-0 transition-all"
            ></span>
          </div>

          <!-- Forgot password -->
          <div class="flex justify-end">
            <a
              href="/forgot-password"
              class="text-[11px] text-accent/70 hover:text-accent font-medium transition-colors hover:underline"
              data-i18n="forgot_pwd"
            ></a>
          </div>

          <!-- Server / credential error -->
          <div
            id="form-error"
            class="hidden text-red-400 text-sm text-center"
          ></div>

          <!-- Submit Button -->
          <button
            type="submit"
            id="btn-submit"
            class="w-full py-4 bg-gradient-to-r from-accent via-accentLight to-accent bg-[length:200%_200%] hover:bg-right text-primaryDark font-bold rounded-xl shadow-lg shadow-accent/20 transition-all active:scale-95 disabled:opacity-70 mt-4"
          >
            <span class="btn-label" data-i18n="btn_login"></span>
            <div
              id="spinner"
              class="hidden w-5 h-5 border-2 border-primaryDark/30 border-t-primaryDark rounded-full animate-spin mx-auto"
            ></div>
          </button>
        </form>

        <p class="text-center text-sm text-textLight mt-6">
          <span data-i18n="register_prompt"></span>
          <a
            href="/register"
            class="text-accent font-semibold hover:underline ml-1"
            data-i18n="register_link"
          ></a>
        </p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
  </body>
</html>
