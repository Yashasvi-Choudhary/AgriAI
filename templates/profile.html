{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="min-h-screen bg-background">
  <div class="max-w-4xl mx-auto p-6">
    <!-- Profile Card -->
    <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-8 mb-8 shadow-lg border border-primary/10">
      <div class="flex items-center gap-6">
        <div class="w-20 h-20 bg-gradient-to-br from-primary to-accent rounded-full flex items-center justify-center text-3xl font-bold text-white">
          {{ user[0][0].upper() if user[0] else 'U' }}
        </div>
        <div>
          <h1 class="text-2xl font-display text-primary mb-1" data-i18n="profile_title">Profile</h1>
          <p class="text-textMid" data-i18n="welcome_back">Welcome back!</p>
        </div>
      </div>
    </div>

    <!-- Profile Update Form -->
    <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-8 mb-8 shadow-lg border border-primary/10">
      <h2 class="text-xl font-display text-primary mb-6" data-i18n="update_profile">Update Profile</h2>
      <form id="profile-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="username">Username</label>
          <input type="text" id="name" value="{{ user[0] }}" class="w-full px-4 py-3 rounded-xl border border-primary/20 focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all" required>
          <p id="error-name" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="email">Email</label>
          <input type="email" value="{{ user[1] }}" class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-gray-100" readonly>
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="phone">Phone</label>
          <input type="text" id="phone" value="{{ user[2] or '' }}" class="w-full px-4 py-3 rounded-xl border border-primary/20 focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all">
          <p id="error-phone" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="location">Location</label>
          <input type="text" id="location" value="{{ user[3] or '' }}" class="w-full px-4 py-3 rounded-xl border border-primary/20 focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all">
          <p id="error-location" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-primary to-accent text-white rounded-xl font-semibold hover:shadow-lg transition-all" data-i18n="update_profile_btn">Update Profile</button>
      </form>
    </div>

    <!-- Change Password Form -->
    <div class="bg-white/80 backdrop-blur-sm rounded-2xl p-8 shadow-lg border border-primary/10">
      <h2 class="text-xl font-display text-primary mb-6" data-i18n="change_password">Change Password</h2>
      <form id="password-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="current_password">Current Password</label>
          <input type="password" id="current_password" class="w-full px-4 py-3 rounded-xl border border-primary/20 focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all" required>
          <p id="error-current_password" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="new_password">New Password</label>
          <input type="password" id="new_password" class="w-full px-4 py-3 rounded-xl border border-primary/20 focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all" required>
          <p id="error-new_password" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-textDark mb-2" data-i18n="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" class="w-full px-4 py-3 rounded-xl border border-primary/20 focus:border-accent focus:ring-2 focus:ring-accent/20 transition-all" required>
          <p id="error-confirm_password" class="text-red-500 text-sm mt-1 hidden"></p>
        </div>
        <p id="error-general" class="text-red-500 text-sm hidden"></p>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-accent to-accentLight text-white rounded-xl font-semibold hover:shadow-lg transition-all" data-i18n="change_password_btn">Change Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
